<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">
    <title>Private Messenger | Чат</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f0f2f5;
        }

        /* Шапка чата */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-details {
            flex: 1;
        }

        .user-details h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .status {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status.online i { color: #4caf50; font-size: 8px; }
        .status.offline i { color: #999; font-size: 8px; }

        .icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:active { transform: scale(0.95); }

        /* Область сообщений */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        /* Сообщения */
        .message {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .message-mine { justify-content: flex-end; }
        .message-content { max-width: 85%; }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
        }

        .message-mine .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-other .message-bubble {
            background: white;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-text { font-size: 15px; line-height: 1.4; }
        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        /* Аудио сообщение */
        .audio-message {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 200px;
        }

        .audio-play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .message-mine .audio-play-btn {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .audio-wave {
            flex: 1;
            height: 32px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .wave-bar {
            width: 3px;
            background: currentColor;
            border-radius: 2px;
            transition: height 0.1s;
        }

        .audio-duration {
            font-size: 12px;
            opacity: 0.7;
            min-width: 40px;
        }

        /* Видео-кружок */
        .video-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .video-circle video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-circle .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* Индикатор набора текста */
        .typing-indicator {
            padding: 8px 16px;
            background: white;
            border-radius: 20px;
            align-self: flex-start;
            margin: 0 16px 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #666;
        }

        .typing-dots { display: flex; gap: 3px; }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* Область ввода */
        .chat-input-area {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #messageInput {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-family: inherit;
            font-size: 16px;
            resize: none;
            max-height: 100px;
            background: #f8f9fa;
        }

        #messageInput:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .action-btn {
            background: #f0f2f5;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: #667eea;
        }

        .action-btn:active { transform: scale(0.95); }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:active { transform: scale(0.95); }

        /* Кнопка записи */
        .record-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .record-btn.recording {
            animation: pulse 1.5s infinite;
            background: #f44336;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Таймер записи */
        .recording-timer {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            font-size: 18px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .recording-timer i {
            color: #f44336;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .send-recording {
            background: #4caf50;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .cancel-recording {
            background: #f44336;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: #f1f1f1; }
        .chat-messages::-webkit-scrollbar-thumb { background: #888; border-radius: 2px; }

        @supports (padding: max(0px)) {
            .chat-header { padding-top: max(12px, env(safe-area-inset-top)); }
            .chat-input-area { padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="user-info">
                <div class="avatar"><i class="fas fa-user"></i></div>
                <div class="user-details">
                    <h3 id="partnerName">Собеседник</h3>
                    <div class="status offline" id="partnerStatus"><i class="fas fa-circle"></i> Offline</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="clearChat()"><i class="fas fa-trash-alt"></i></button>
                <button class="icon-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div style="text-align: center; color: #999; padding: 60px 20px;">
                <i class="fas fa-comment-dots" style="font-size: 48px;"></i>
                <h3>Нет сообщений</h3>
                <p style="font-size: 14px; margin-top: 8px;">Напишите первое сообщение</p>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator" style="display: none;">
            <span>Собеседник печатает</span>
            <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
        
        <div class="chat-input-area">
            <div class="input-container">
                <div class="message-input-wrapper">
                    <textarea id="messageInput" placeholder="Сообщение..." rows="1"></textarea>
                </div>
                <div class="action-buttons">
                    <button class="action-btn" id="voiceRecordBtn" title="Голосовое сообщение (удерживайте)">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button class="action-btn" id="videoRecordBtn" title="Видео-кружок">
                        <i class="fas fa-video"></i>
                    </button>
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== ПЕРЕМЕННЫЕ ====================
        let currentUserId = null, currentUsername = null, partnerId = null;
        let updateInterval = null, typingTimeout = null;
        let isScrolledToBottom = true;
        let isPageActive = true;
        
        // Переменные для записи
        let mediaRecorder = null;
        let audioChunks = [];
        let videoChunks = [];
        let recordingTimer = null;
        let recordingSeconds = 0;
        let isRecording = false;
        let recordingType = null;
        let stream = null;
        
        // DOM элементы
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const voiceRecordBtn = document.getElementById('voiceRecordBtn');
        const videoRecordBtn = document.getElementById('videoRecordBtn');
        
        // ==================== АУТЕНТИФИКАЦИЯ ====================
        function checkAuth() {
            currentUserId = localStorage.getItem('user_id');
            currentUsername = localStorage.getItem('username');
            if (!currentUserId || !currentUsername) {
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }
        
        async function loadPartner() {
            try {
                const response = await fetch(`api/get_partner.php?user_id=${currentUserId}`);
                const result = await response.json();
                if (result.success && result.partner) {
                    partnerId = result.partner.id;
                    document.getElementById('partnerName').textContent = result.partner.username;
                    updateStatus(result.partner.status);
                }
            } catch (error) { console.error('Error loading partner:', error); }
        }
        
        function updateStatus(status) {
            const statusEl = document.getElementById('partnerStatus');
            if (status === 'online') {
                statusEl.className = 'status online';
                statusEl.innerHTML = '<i class="fas fa-circle"></i> Online';
            } else {
                statusEl.className = 'status offline';
                statusEl.innerHTML = '<i class="fas fa-circle"></i> Offline';
            }
        }
        
        // ==================== СООБЩЕНИЯ ====================
        async function loadMessages() {
            if (!currentUserId || !partnerId) return;
            try {
                const response = await fetch(`api/get_messages.php?user_id=${currentUserId}&partner_id=${partnerId}&t=${Date.now()}`);
                const result = await response.json();
                if (result.success) displayMessages(result.messages);
            } catch (error) { console.error('Error loading messages:', error); }
        }
        
        function displayMessages(messages) {
            const container = chatMessages;
            const wasScrolledToBottom = isScrolledToBottom;
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 60px 20px;"><i class="fas fa-comment-dots" style="font-size: 48px;"></i><h3>Нет сообщений</h3><p style="font-size: 14px; margin-top: 8px;">Напишите первое сообщение</p></div>';
                return;
            }
            
            const messagesHtml = messages.map(msg => {
                const isMine = msg.sender_id == currentUserId;
                const time = new Date(msg.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
                
                if (msg.message_type === 'audio') {
                    return renderAudioMessage(msg, isMine, time);
                } else if (msg.message_type === 'video_circle') {
                    return renderVideoCircleMessage(msg, isMine, time);
                } else {
                    return renderTextMessage(msg, isMine, time);
                }
            }).join('');
            
            container.innerHTML = messagesHtml;
            if (wasScrolledToBottom) setTimeout(() => container.scrollTop = container.scrollHeight, 100);
            
            // Инициализация плееров
            initAudioPlayers();
            initVideoPlayers();
        }
        
        function renderTextMessage(msg, isMine, time) {
            return `
                <div class="message ${isMine ? 'message-mine' : 'message-other'}">
                    <div class="message-content">
                        <div class="message-bubble">
                            <div class="message-text">${escapeHtml(msg.message)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderAudioMessage(msg, isMine, time) {
            const duration = formatDuration(msg.duration);
            return `
                <div class="message ${isMine ? 'message-mine' : 'message-other'}">
                    <div class="message-content">
                        <div class="message-bubble">
                            <div class="audio-message">
                                <button class="audio-play-btn" data-audio-id="${msg.id}" onclick="toggleAudio(this)">
                                    <i class="fas fa-play"></i>
                                </button>
                                <div class="audio-wave" id="wave-${msg.id}"></div>
                                <span class="audio-duration">${duration}</span>
                            </div>
                            <audio class="audio-player" data-id="${msg.id}" src="api/get_file.php?file=${msg.file_path}" style="display: none;"></audio>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderVideoCircleMessage(msg, isMine, time) {
            return `
                <div class="message ${isMine ? 'message-mine' : 'message-other'}">
                    <div class="message-content">
                        <div class="message-bubble" style="padding: 0; overflow: hidden; border-radius: 20px;">
                            <div class="video-circle" data-video-url="api/get_file.php?file=${msg.file_path}">
                                <video preload="metadata">
                                    <source src="api/get_file.php?file=${msg.file_path}" type="video/mp4">
                                </video>
                                <div class="play-overlay">
                                    <i class="fas fa-play"></i>
                                </div>
                            </div>
                            <div class="message-time" style="padding: 8px 12px;">${time}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function initAudioPlayers() {
            document.querySelectorAll('.audio-player').forEach(player => {
                const audio = player;
                const btn = player.parentElement.querySelector('.audio-play-btn');
                const waveContainer = player.parentElement.querySelector('.audio-wave');
                
                audio.addEventListener('timeupdate', () => {
                    const progress = (audio.currentTime / audio.duration) * 100;
                    updateWaveform(waveContainer, progress);
                });
                
                audio.addEventListener('ended', () => {
                    btn.innerHTML = '<i class="fas fa-play"></i>';
                    resetWaveform(waveContainer);
                });
            });
        }
        
        function initVideoPlayers() {
            document.querySelectorAll('.video-circle').forEach(video => {
                video.addEventListener('click', () => {
                    const videoEl = video.querySelector('video');
                    const overlay = video.querySelector('.play-overlay');
                    if (videoEl.paused) {
                        videoEl.play();
                        if (overlay) overlay.style.display = 'none';
                    } else {
                        videoEl.pause();
                        if (overlay) overlay.style.display = 'flex';
                    }
                });
            });
        }
        
        function toggleAudio(btn) {
            const audio = btn.closest('.message-bubble').querySelector('.audio-player');
            const icon = btn.querySelector('i');
            
            if (audio.paused) {
                document.querySelectorAll('.audio-player').forEach(a => {
                    if (a !== audio && !a.paused) {
                        a.pause();
                        const otherBtn = a.parentElement.querySelector('.audio-play-btn i');
                        if (otherBtn) otherBtn.className = 'fas fa-play';
                    }
                });
                audio.play();
                icon.className = 'fas fa-pause';
            } else {
                audio.pause();
                icon.className = 'fas fa-play';
            }
        }
        
        function updateWaveform(container, progress) {
            let bars = container.querySelectorAll('.wave-bar');
            if (!bars.length) {
                for (let i = 0; i < 20; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'wave-bar';
                    const height = 10 + Math.random() * 22;
                    bar.style.height = height + 'px';
                    container.appendChild(bar);
                }
                bars = container.querySelectorAll('.wave-bar');
            }
            
            const activeCount = Math.floor((progress / 100) * bars.length);
            bars.forEach((bar, idx) => {
                bar.style.opacity = idx < activeCount ? '1' : '0.3';
            });
        }
        
        function resetWaveform(container) {
            const bars = container.querySelectorAll('.wave-bar');
            bars.forEach(bar => bar.style.opacity = '0.3');
        }
        
        // ==================== ОТПРАВКА СООБЩЕНИЙ ====================
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            try {
                const response = await fetch('api/send_message.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        sender_id: currentUserId,
                        receiver_id: partnerId,
                        message: message,
                        type: 'text'
                    })
                });
                const result = await response.json();
                if (result.success) {
                    messageInput.value = '';
                    messageInput.style.height = 'auto';
                    await loadMessages();
                    if ('vibrate' in navigator) navigator.vibrate(50);
                }
            } catch (error) { console.error(error); }
        }
        
        // ==================== ЗАПИСЬ ГОЛОСА ====================
        async function startAudioRecording() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendMediaMessage(audioBlob, 'audio', recordingSeconds);
                    stopRecording();
                };
                
                mediaRecorder.start();
                isRecording = true;
                recordingType = 'audio';
                startTimer();
                showRecordingUI('audio');
                
            } catch (err) {
                console.error('Audio error:', err);
                alert('Не удалось получить доступ к микрофону');
            }
        }
        
        // ==================== ЗАПИСЬ ВИДЕО-КРУЖКА ====================
        async function startVideoRecording() {
            try {
                const constraints = {
                    video: { width: { ideal: 360 }, height: { ideal: 360 }, facingMode: 'user' },
                    audio: true
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                mediaRecorder = new MediaRecorder(stream);
                videoChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) videoChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const videoBlob = new Blob(videoChunks, { type: 'video/mp4' });
                    await sendMediaMessage(videoBlob, 'video_circle', recordingSeconds);
                    stopRecording();
                };
                
                mediaRecorder.start();
                isRecording = true;
                recordingType = 'video';
                startTimer();
                showRecordingUI('video');
                
            } catch (err) {
                console.error('Video error:', err);
                alert('Не удалось получить доступ к камере');
            }
        }
        
        function showRecordingUI(type) {
            const timerDiv = document.createElement('div');
            timerDiv.className = 'recording-timer';
            timerDiv.id = 'recordingTimer';
            timerDiv.innerHTML = `
                <i class="fas fa-circle"></i>
                <span id="recordingTime">0:00</span>
                <span style="font-size: 12px;">${type === 'audio' ? '🎙️ Запись голоса...' : '🎥 Запись видео...'}</span>
                <button class="send-recording" onclick="stopRecordingAndSend()">Отправить</button>
                <button class="cancel-recording" onclick="cancelRecording()">Отмена</button>
            `;
            document.body.appendChild(timerDiv);
            if ('vibrate' in navigator) navigator.vibrate(100);
        }
        
        function startTimer() {
            recordingSeconds = 0;
            recordingTimer = setInterval(() => {
                recordingSeconds++;
                const minutes = Math.floor(recordingSeconds / 60);
                const seconds = recordingSeconds % 60;
                const timeDisplay = document.getElementById('recordingTime');
                if (timeDisplay) {
                    timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
                const maxTime = recordingType === 'audio' ? 60 : 30;
                if (recordingSeconds >= maxTime) stopRecordingAndSend();
            }, 1000);
        }
        
        function stopRecordingAndSend() {
            if (mediaRecorder && isRecording) mediaRecorder.stop();
        }
        
        function cancelRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.onstop = () => stopRecording();
                mediaRecorder.stop();
            } else {
                stopRecording();
            }
        }
        
        function stopRecording() {
            clearInterval(recordingTimer);
            isRecording = false;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            const timerDiv = document.getElementById('recordingTimer');
            if (timerDiv) timerDiv.remove();
            if ('vibrate' in navigator) navigator.vibrate(100);
        }
        
        async function sendMediaMessage(blob, type, duration) {
            const formData = new FormData();
            const extension = type === 'audio' ? 'webm' : 'mp4';
            formData.append('file', blob, `${type}_${Date.now()}.${extension}`);
            formData.append('type', type);
            formData.append('duration', duration);
            formData.append('sender_id', currentUserId);
            formData.append('receiver_id', partnerId);
            
            try {
                const response = await fetch('api/upload_media.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.success) await loadMessages();
            } catch (error) {
                console.error('Send error:', error);
            }
        }
        
        // ==================== СТАТУСЫ И УВЕДОМЛЕНИЯ ====================
        function sendTypingStatus() {
            if (typingTimeout) clearTimeout(typingTimeout);
            fetch('api/typing.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: currentUserId, partner_id: partnerId, is_typing: true})
            });
            typingTimeout = setTimeout(() => {
                fetch('api/typing.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: currentUserId, partner_id: partnerId, is_typing: false})
                });
            }, 2000);
        }
        
        async function checkTypingStatus() {
            try {
                const response = await fetch(`api/typing.php?user_id=${currentUserId}&partner_id=${partnerId}`);
                const result = await response.json();
                document.getElementById('typingIndicator').style.display = result.is_typing ? 'flex' : 'none';
            } catch (error) { console.error(error); }
        }
        
        async function markAsRead() {
            try {
                await fetch('api/mark_read.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: currentUserId, partner_id: partnerId})
                });
            } catch (error) { console.error(error); }
        }
        
        async function clearChat() {
            if (confirm('Очистить историю чата?')) {
                try {
                    await fetch('api/clear_chat.php', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({user_id: currentUserId, partner_id: partnerId})
                    });
                    await loadMessages();
                } catch (error) { console.error(error); }
            }
        }
        
        async function logout() {
            try {
                await fetch('api/auth.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'logout', user_id: currentUserId})
                });
            } catch(e) {}
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function startPolling() {
            if (updateInterval) clearInterval(updateInterval);
            loadMessages();
            updateInterval = setInterval(() => {
                loadMessages();
                checkTypingStatus();
            }, 3000);
        }
        
        // ==================== ОБРАБОТЧИКИ ====================
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
            if (messageInput.value.trim()) sendTypingStatus();
        });
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        chatMessages.addEventListener('scroll', () => {
            isScrolledToBottom = chatMessages.scrollHeight - chatMessages.scrollTop <= chatMessages.clientHeight + 50;
        });
        
        document.addEventListener('visibilitychange', () => {
            isPageActive = !document.hidden;
            if (isPageActive) markAsRead();
        });
        
        // Долгое нажатие для записи голоса
        let pressTimer = null;
        
        voiceRecordBtn.addEventListener('mousedown', () => {
            pressTimer = setTimeout(() => startAudioRecording(), 300);
        });
        
        voiceRecordBtn.addEventListener('mouseup', () => {
            if (pressTimer) clearTimeout(pressTimer);
            if (isRecording && recordingType === 'audio') stopRecordingAndSend();
        });
        
        voiceRecordBtn.addEventListener('mouseleave', () => {
            if (pressTimer) clearTimeout(pressTimer);
        });
        
        voiceRecordBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            pressTimer = setTimeout(() => startAudioRecording(), 300);
        });
        
        voiceRecordBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (pressTimer) clearTimeout(pressTimer);
            if (isRecording && recordingType === 'audio') stopRecordingAndSend();
        });
        
        videoRecordBtn.addEventListener('click', () => startVideoRecording());
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        if (checkAuth()) {
            loadPartner().then(() => startPolling());
        }
    </script>
</body>
</html>
