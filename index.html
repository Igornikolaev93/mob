<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">
    <title>Private Messenger | Мобильная версия</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
        }

        /* Контейнер для мобильных устройств */
        .mobile-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            animation: slideUp 0.5s ease;
        }

        /* Карточка авторизации */
        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Шапка */
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 32px 24px;
        }

        .card-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .card-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .tab {
            flex: 1;
            padding: 16px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .tab.active {
            color: #667eea;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
        }

        /* Формы */
        .form-container {
            padding: 24px;
        }

        .form {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form.active {
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Уведомления */
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
            font-size: 14px;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
        }

        /* Анимации */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Сенсорные оптимизации */
        @media (hover: none) {
            .btn:hover {
                transform: none;
            }
        }

        /* Для iPhone с вырезом */
        @supports (padding: max(0px)) {
            .card-header {
                padding-top: max(32px, env(safe-area-inset-top));
            }
            .form-container {
                padding-bottom: max(24px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="auth-card">
            <div class="card-header">
                <h1>
                    <i class="fas fa-comment-dots"></i>
                    Private Messenger
                </h1>
                <p>Безопасное общение на ходу</p>
            </div>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Вход</button>
                <button class="tab" onclick="switchTab('register')">Регистрация</button>
            </div>
            
            <div class="form-container">
                <div id="alertMessage"></div>
                
                <!-- Форма входа -->
                <div id="loginForm" class="form active">
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Имя или Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="text" id="loginUsername" placeholder="username@example.com">
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Пароль</label>
                        <div class="input-wrapper">
                            <i class="fas fa-key"></i>
                            <input type="password" id="loginPassword" placeholder="••••••">
                        </div>
                    </div>
                    <button class="btn" onclick="mobileLogin()">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                </div>
                
                <!-- Форма регистрации -->
                <div id="registerForm" class="form">
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Имя пользователя</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="regUsername" placeholder="От 3 до 50 символов">
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" placeholder="your@email.com">
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Пароль</label>
                        <div class="input-wrapper">
                            <i class="fas fa-key"></i>
                            <input type="password" id="regPassword" placeholder="Минимум 6 символов">
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-check-circle"></i> Подтверждение</label>
                        <div class="input-wrapper">
                            <i class="fas fa-check"></i>
                            <input type="password" id="regConfirmPassword" placeholder="Повторите пароль">
                        </div>
                    </div>
                    <button class="btn" onclick="mobileRegister()">
                        <i class="fas fa-user-plus"></i> Создать аккаунт
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Переключение вкладок
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            hideAlert();
        }

        // Показ уведомлений
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
            alertDiv.style.display = 'block';
            
            // Автоматическое скрытие через 3 секунды
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }

        function hideAlert() {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.style.display = 'none';
        }

        // Мобильный вход
        async function mobileLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showAlert('Заполните все поля', 'error');
                return;
            }
            
            // Показываем загрузку
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Вход...';
            btn.disabled = true;
            
            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'login', username, password})
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('user_id', result.user_id);
                    localStorage.setItem('username', result.username);
                    showAlert('Вход выполнен!', 'success');
                    setTimeout(() => {
                        window.location.href = 'mobile-chat.html';
                    }, 1000);
                } else {
                    showAlert(result.error || 'Ошибка входа', 'error');
                }
            } catch (error) {
                showAlert('Ошибка соединения', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Мобильная регистрация
        async function mobileRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!username || !email || !password || !confirm) {
                showAlert('Заполните все поля', 'error');
                return;
            }
            
            if (username.length < 3 || username.length > 50) {
                showAlert('Имя от 3 до 50 символов', 'error');
                return;
            }
            
            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                showAlert('Введите корректный email', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('Пароль минимум 6 символов', 'error');
                return;
            }
            
            if (password !== confirm) {
                showAlert('Пароли не совпадают', 'error');
                return;
            }
            
            // Показываем загрузку
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Регистрация...';
            btn.disabled = true;
            
            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'register', username, email, password})
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('Регистрация успешна!', 'success');
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('regUsername').value = '';
                        document.getElementById('regEmail').value = '';
                        document.getElementById('regPassword').value = '';
                        document.getElementById('regConfirmPassword').value = '';
                    }, 1500);
                } else {
                    showAlert(result.error || 'Ошибка регистрации', 'error');
                }
            } catch (error) {
                showAlert('Ошибка соединения', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Добавляем поддержку Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const activeForm = document.querySelector('.form.active');
                if (activeForm.id === 'loginForm') {
                    mobileLogin();
                } else if (activeForm.id === 'registerForm') {
                    mobileRegister();
                }
            }
        });
    </script>
</body>
</html>
